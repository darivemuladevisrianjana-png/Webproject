<!DOCTYPE html>
<html>
<head>
    <title>Fixed Background Image</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("D:/login.jpg"); /* Your image path */
            background-size: cover;          /* Cover full screen */
            background-position: center;     /* Center image */
            background-repeat: no-repeat;    /* No repeat */
            background-attachment: fixed;    /* Makes image fixed */
            font-family: Arial, sans-serif;
        }

        .content {
            height: 1500px; /* Just for scrolling */
            color: white;
            text-align: center;
            padding-top: 200px;
            font-size: 30px;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>HI THIS IS BALAJI</h1>
        <p style="color:black";>WELCOME TO MY WEB PAGE</p>
    </div>

</body>
</html>

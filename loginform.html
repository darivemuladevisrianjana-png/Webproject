<!DOCTYPE html>
<html>
<head>
<title>Login Form</title>
</head>
<style>

body{
margin:0;
padding:0;
font-family:Arial;

background-image:url("D:/login 1.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

.login-box{
width:300px;
background:rgba(0,0,0,0.7);
color:white;
padding:40px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
border-radius:10px;
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

.login-box input[type="submit"]{
background:#4CAF50;
color:white;
cursor:pointer;
}

.login-box input[type="submit"]:hover{
background:#45a049;
}

</style>


<body>

<div class="login-box">
<h2>Login Form</h2>

<form>
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<input type="submit" value="Login">
</form>

</div>

</body>
</html>
